name: "UENF Theme Admin UX — Auditoria, Plano e Documentação"
code: uenf-theme-admin-ux
description: >
  Audita o painel de administração do Tema UENF (wp-admin + Customizer),
  identifica problemas de UI/UX e tarefas pendentes, cria um plano de trabalho
  priorizado e produz documentação de usuário para administradores e desenvolvedores.

skills:
  - web_search

pipeline:
  max_review_cycles: 1
  steps:
    - id: audit-admin-ux
      agent: ux-auditor
      description: "Auditar o painel admin do Tema UENF: páginas wp-admin, Customizer (47 seções), 13 extensões, documentação vazia — identificar problemas de UI/UX e tarefas pendentes"

    - id: checkpoint-audit
      type: checkpoint
      description: "Edson revisa o relatório de auditoria antes de prosseguir com o plano"

    - id: work-plan
      agent: work-planner
      description: "Criar plano de trabalho priorizado (P0/P1/P2) com base nos findings da auditoria"

    - id: documentation
      agent: doc-writer
      description: "Escrever documentação de usuário para administradores e desenvolvedores/mantenedores"

    - id: checkpoint-final
      type: checkpoint
      description: "Aprovação final do plano de trabalho e documentação pelo Edson"
