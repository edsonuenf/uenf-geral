name: "UENF CSS Performance — Separação Mobile/Tablet/Desktop"
code: uenf-css-performance
description: >
  Divide o CSS monolítico do tema UENF em 3 bundles carregados condicionalmente
  por media query (<link media="...">) para mobile, tablet e desktop.
  CSS comum carrega para todos. Resultado: menor payload por device,
  melhor Core Web Vitals (FCP, LCP), melhor SEO.

skills:
  - web_search

pipeline:
  max_review_cycles: 2
  steps:
    - id: audit-css
      agent: auditor
      description: "Auditar todos os 38 CSS/SCSS do tema, mapear cada regra para mobile/tablet/desktop/common"

    - id: plan-split
      agent: architect
      description: "Projetar a arquitetura de split: quais arquivos criar, como compilar, como enqueue"

    - id: checkpoint-plan
      type: checkpoint
      description: "Apresentar plano de arquitetura ao Edson para aprovação"

    - id: extract-mobile
      agent: mobile-dev
      description: "Extrair todas as media queries mobile (max-width: 767.98px) para css/responsive/mobile.css"

    - id: extract-tablet
      agent: tablet-dev
      description: "Extrair todas as media queries tablet (768px-991.98px) para css/responsive/tablet.css"

    - id: extract-desktop
      agent: desktop-dev
      description: "Extrair todas as media queries desktop (min-width: 992px) para css/responsive/desktop.css"

    - id: enqueue-conditional
      agent: architect
      description: "Implementar carregamento condicional no functions.php com <link media='...'>"

    - id: build-test
      agent: build-eng
      description: "Rodar webpack build, verificar que nenhum estilo quebrou, medir performance"

    - id: checkpoint-review
      type: checkpoint
      description: "Validação visual: mobile, tablet e desktop"

    - id: seo-audit
      agent: seo-eng
      description: "Auditar Core Web Vitals, gerar relatório de performance antes/depois"

    - id: commit-release
      agent: release-mgr
      description: "Atualizar CHANGELOG, criar commit, resumo final"

    - id: checkpoint-final
      type: checkpoint
      description: "Aprovação final e entrega"
