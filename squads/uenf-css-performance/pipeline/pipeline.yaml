steps:
  - id: audit-css
    file: steps/01-audit-css.md
    agent: auditor
    execution: inline
    outputFile: squads/uenf-css-performance/output/audit-report.md

  - id: plan-split
    file: steps/02-plan-split.md
    agent: architect
    execution: inline
    inputFile: squads/uenf-css-performance/output/audit-report.md
    outputFile: squads/uenf-css-performance/output/architecture-plan.md

  - id: checkpoint-plan
    file: steps/03-checkpoint-plan.md
    type: checkpoint

  - id: extract-mobile
    file: steps/04-extract-mobile.md
    agent: mobile-dev
    execution: subagent
    parallel_group: css-split
    inputFile: squads/uenf-css-performance/output/architecture-plan.md
    outputFile: css/responsive/mobile.css

  - id: extract-tablet
    file: steps/05-extract-tablet.md
    agent: tablet-dev
    execution: subagent
    parallel_group: css-split
    inputFile: squads/uenf-css-performance/output/architecture-plan.md
    outputFile: css/responsive/tablet.css

  - id: extract-desktop
    file: steps/06-extract-desktop.md
    agent: desktop-dev
    execution: subagent
    parallel_group: css-split
    inputFile: squads/uenf-css-performance/output/architecture-plan.md
    outputFile: css/responsive/desktop.css

  - id: enqueue-conditional
    file: steps/07-enqueue-conditional.md
    agent: architect
    execution: inline

  - id: build-test
    file: steps/08-build-test.md
    agent: build-eng
    execution: inline
    outputFile: squads/uenf-css-performance/output/build-report.md

  - id: checkpoint-review
    file: steps/09-checkpoint-review.md
    type: checkpoint

  - id: seo-audit
    file: steps/10-seo-audit.md
    agent: seo-eng
    execution: inline
    outputFile: squads/uenf-css-performance/output/seo-report.md

  - id: commit-release
    file: steps/11-commit-release.md
    agent: release-mgr
    execution: inline

  - id: checkpoint-final
    file: steps/12-checkpoint-final.md
    type: checkpoint
