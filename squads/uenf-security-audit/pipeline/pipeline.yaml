steps:
  # Steps 1-2-3 rodam em PARALELO (parallel_group: security-audit)
  - id: audit-php
    file: steps/01-audit-php.md
    agent: php-auditor
    execution: subagent
    parallel_group: security-audit
    outputFile: squads/uenf-security-audit/output/php-audit-report.md

  - id: audit-js
    file: steps/02-audit-js.md
    agent: js-auditor
    execution: subagent
    parallel_group: security-audit
    outputFile: squads/uenf-security-audit/output/js-audit-report.md

  - id: audit-wp-config
    file: steps/03-audit-wp-config.md
    agent: wp-config-auditor
    execution: subagent
    parallel_group: security-audit
    outputFile: squads/uenf-security-audit/output/wp-config-audit-report.md

  # Checkpoint após os 3 paralelos terminarem
  - id: checkpoint-audit
    file: steps/04-checkpoint-audit.md
    type: checkpoint

  - id: security-report
    file: steps/05-security-report.md
    agent: security-reporter
    execution: inline
    outputFile: squads/uenf-security-audit/output/security-report.md

  - id: fix-critical
    file: steps/06-fix-critical.md
    agent: security-fixer
    execution: inline
    inputFile: squads/uenf-security-audit/output/security-report.md

  - id: checkpoint-fixes
    file: steps/07-checkpoint-fixes.md
    type: checkpoint

  - id: commit-release
    file: steps/08-commit-release.md
    agent: release-mgr
    execution: inline
