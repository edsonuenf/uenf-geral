name: uenf-dev
description: >
  Squad completo de desenvolvimento do tema WordPress da UENF (uenf-geral).
  Cobre todo o ciclo: análise de desenvolvimento, design system, UX/UI,
  UX writing, SEO/GEO, testes de frontend, backend, segurança e documentação
  de release. Padrões e modelos (patterns) são responsabilidade do plugin
  uenf-templates — este squad não gera patterns.

version: "1.0.0"
language: pt-BR
frequency: on-demand

agents:
  # Desenvolvimento
  - id: lucas
    name: Lucas
    role: WordPress Template Developer
    best_practices:
      - review
      - technical-writing

  # Design System (incorpora sugestão anterior: Design Token Reviewer)
  - id: isabela
    name: Isabela
    role: Designer & Design System
    best_practices:
      - review

  # UX/UI
  - id: marina
    name: Marina
    role: UX/UI Specialist
    best_practices:
      - review

  # UX Writing
  - id: camila
    name: Camila
    role: UX Writer
    best_practices:
      - copywriting

  # SEO / GEO (Generative Engine Optimization)
  - id: pedro
    name: Pedro
    role: SEO & GEO Specialist
    best_practices:
      - review

  # Testes de Frontend
  - id: rafael
    name: Rafael
    role: Frontend Tester
    best_practices:
      - review

  # Testes de Backend
  - id: diego
    name: Diego
    role: Backend Tester
    best_practices:
      - review
      - technical-writing

  # Segurança (incorpora sugestão anterior: Security Reviewer)
  - id: andre
    name: André
    role: Security Reviewer
    best_practices:
      - review

  # Release Manager (incorpora sugestão anterior: Release Manager)
  - id: beatriz
    name: Beatriz
    role: Release Manager & Documentation
    best_practices:
      - technical-writing

pipeline:
  # ── FASE 1: Análise e Revisões ────────────────────────────────────────────

  - step: 1
    name: dev-analysis
    agent: lucas
    description: >
      Analisar os arquivos modificados do tema (PHP, SCSS, JS, theme.json).
      Mapear o que foi alterado, identificar intenção das mudanças, detectar
      desvios de padrões WordPress (Coding Standards, template hierarchy,
      hooks/filters), e produzir um brief técnico para os demais agentes.
      NÃO gerar patterns — padrões são responsabilidade do plugin uenf-templates.
    inputs:
      - git diff ou lista de arquivos modificados
    outputs:
      - dev-brief.md

  - step: 2
    name: design-system-review
    agent: isabela
    description: >
      Revisar consistência do design system:
      1. Verificar alinhamento entre variables.scss, theme.json e as cores/fontes
         registradas via PHP (add_theme_support editor-color-palette, etc.)
      2. Checar escala tipográfica, espaçamentos e tokens visuais
      3. Avaliar se novos componentes seguem o sistema visual estabelecido
      4. Identificar tokens hardcoded que deveriam ser variáveis
    inputs:
      - dev-brief.md
      - arquivos SCSS e theme.json modificados
    outputs:
      - design-system-report.md

  - step: 3
    name: ux-ui-review
    agent: marina
    description: >
      Revisar usabilidade e consistência de interface:
      1. Avaliar hierarquia visual de novos templates/componentes
      2. Verificar estados interativos (hover, focus, active, disabled)
      3. Checar responsividade e comportamento em mobile
      4. Avaliar consistência de padrões de UI em relação ao design system
      5. Identificar anti-padrões de usabilidade
    inputs:
      - dev-brief.md
      - design-system-report.md
    outputs:
      - ux-ui-report.md

  - step: 4
    name: ux-writing-review
    agent: camila
    description: >
      Revisar todos os textos presentes nos templates e componentes modificados:
      1. Labels, botões, CTAs e textos de interface
      2. Mensagens de erro e estados vazios
      3. Textos de acessibilidade (aria-label, alt, screen-reader-text)
      4. Consistência com o tom de voz da UENF (profissional, acessível, institucional)
      5. Uso correto de maiúsculas, pontuação e linguagem inclusiva
    inputs:
      - dev-brief.md
      - ux-ui-report.md
    outputs:
      - ux-writing-report.md

  - step: 5
    name: seo-geo-review
    agent: pedro
    description: >
      Revisar SEO técnico e GEO (Generative Engine Optimization) do tema:

      SEO Técnico:
      1. Verificar estrutura semântica de headings nos templates (h1 único por página,
         hierarquia h2→h3→h4 correta)
      2. Checar implementação de meta tags (title, description) via wp_head e
         compatibilidade com plugins SEO (Yoast, RankMath)
      3. Validar dados estruturados Schema.org presentes nos templates
         (Article, BreadcrumbList, Organization, Person, Event)
      4. Verificar atributos alt em imagens e textos descritivos para indexação
      5. Checar URLs canônicas e tratamento de paginação
      6. Avaliar Core Web Vitals sob ótica de SEO: LCP, CLS, FID/INP

      GEO (Generative Engine Optimization — indexação por IAs como ChatGPT, Perplexity, Gemini):
      7. Verificar se o conteúdo dos templates é estruturado de forma clara e factual
         para leitura por LLMs (parágrafos curtos, definições explícitas, entidades nomeadas)
      8. Checar presença de sinais E-E-A-T (Experience, Expertise, Authoritativeness,
         Trustworthiness) nos templates institucionais
      9. Avaliar se páginas-chave têm FAQ estruturado ou dados que facilitam
         extração de respostas por motores de busca generativos
      10. Verificar robots.txt e sitemap.xml — se o tema interfere com a indexação

      WordPress específico:
      11. Verificar se wp_head() e wp_footer() estão presentes e sem remoções indevidas
      12. Checar se o tema não remove feeds RSS (usados por agregadores e crawlers de IA)
    inputs:
      - dev-brief.md
      - ux-writing-report.md
    outputs:
      - seo-geo-report.md

  - step: 6
    name: checkpoint-mid
    type: checkpoint
    description: >
      Ponto de revisão após as análises de desenvolvimento, design, UX, escrita e SEO/GEO.
      Apresentar os 5 relatórios e perguntar se há itens bloqueantes ou
      ajustes necessários antes de continuar para os testes.
    questions:
      - question: Os relatórios de análise estão completos? Deseja continuar para os testes?
        options:
          - Sim, continuar para testes
          - Há itens bloqueantes a resolver antes

  # ── FASE 2: Testes ───────────────────────────────────────────────────────

  - step: 7
    name: frontend-testing
    agent: rafael
    description: >
      Testar a camada de apresentação do tema:
      1. Verificar renderização de CSS/SCSS compilado (consistência visual)
      2. Checar comportamento de JavaScript (eventos, interações, erros de console)
      3. Validar renderização de blocos Gutenberg nos templates modificados
      4. Testar estados de foco e navegação por teclado
      5. Verificar carregamento de assets (scripts, styles enfileirados corretamente)
      6. Apontar regressões visuais em relação ao estado anterior
    inputs:
      - dev-brief.md
      - design-system-report.md
      - ux-ui-report.md
    outputs:
      - frontend-test-report.md

  - step: 8
    name: backend-testing
    agent: diego
    description: >
      Testar a camada de lógica e servidor do tema:
      1. Verificar hooks e filters (add_action, add_filter) — registrados corretamente
      2. Checar template hierarchy — arquivos na hierarquia correta do WordPress
      3. Validar funções PHP — parâmetros, retornos, tratamento de erros
      4. Verificar queries WP_Query — performance, sanitização, uso de índices
      5. Testar integração com REST API / endpoints customizados
      6. Checar compatibilidade com versões mínimas de WordPress e PHP
    inputs:
      - dev-brief.md
    outputs:
      - backend-test-report.md

  - step: 9
    name: security-audit
    agent: andre
    description: >
      Auditoria de segurança do tema (OWASP WordPress Security):
      1. Verificar sanitização de inputs (sanitize_text_field, esc_attr, etc.)
      2. Checar escapamento de outputs (esc_html, esc_url, wp_kses, etc.)
      3. Validar nonces em formulários e requisições AJAX
      4. Verificar verificações de capabilities (current_user_can)
      5. Identificar exposição de dados sensíveis ou paths de servidor
      6. Checar direct file access protection (ABSPATH check)
      7. Verificar uso seguro de $wpdb (prepared statements)
    inputs:
      - dev-brief.md
      - backend-test-report.md
    outputs:
      - security-report.md

  - step: 10
    name: checkpoint-final
    type: checkpoint
    description: >
      Ponto de revisão final após todos os testes.
      Apresentar relatórios de frontend, backend e segurança.
      Definir se o conjunto está aprovado para merge ou precisa de correções.
    questions:
      - question: Os testes foram concluídos. O conjunto está aprovado para merge?
        options:
          - Aprovado — gerar documentação de release
          - Reprovado — há issues bloqueantes

  # ── FASE 3: Release ──────────────────────────────────────────────────────

  - step: 11
    name: release-documentation
    agent: beatriz
    description: >
      Consolidar todos os relatórios e gerar documentação de release:
      1. Entrada estruturada para CHANGELOG.md (formato Keep a Changelog)
      2. Resumo executivo da sessão para o time
      3. Lista de issues pendentes (não-bloqueantes) para o backlog
      4. Sugestão de bump de versão semântica (patch/minor/major)
    inputs:
      - dev-brief.md
      - design-system-report.md
      - ux-ui-report.md
      - ux-writing-report.md
      - seo-geo-report.md
      - frontend-test-report.md
      - backend-test-report.md
      - security-report.md
    outputs:
      - CHANGELOG-entry.md
      - session-summary.md
      - backlog-issues.md

output_dir: squads/uenf-dev/output
memory_file: squads/uenf-dev/_memory/memories.md
