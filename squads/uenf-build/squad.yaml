name: uenf-build
description: >
  Squad de build e empacotamento de produção do tema WordPress uenf-geral-claude.
  Executa o pipeline completo: validação de ambiente, compilação Webpack (SCSS→CSS,
  JS transpilado e minificado), validação dos assets gerados, bump de versão semântica,
  empacotamento ZIP limpo para deploy e geração de release notes.

version: "1.0.0"
language: pt-BR
frequency: on-demand

agents:
  # Build Engineer — compila, valida e executa o build Webpack
  - id: carlos
    name: Carlos
    role: Build Engineer
    best_practices:
      - technical-writing

  # Version Manager — gerencia versão semântica e release notes
  - id: vera
    name: Vera
    role: Version Manager
    best_practices:
      - technical-writing

  # Package Engineer — empacota o ZIP de produção
  - id: fabio
    name: Fábio
    role: Package Engineer
    best_practices:
      - technical-writing

pipeline:
  # ── FASE 1: Validação de Ambiente ─────────────────────────────────────────

  - step: 1
    name: environment-check
    agent: carlos
    description: >
      Validar o ambiente de build antes de compilar:
      1. Verificar se `node_modules/` existe (npm install foi executado)
      2. Ler `package.json` e validar scripts de build presentes
      3. Ler `webpack.config.js` e confirmar entrypoints e output path
      4. Verificar se os arquivos de entrada existem:
         - `js/main.js`
         - `scss/style.scss`
      5. Checar SCSS por erros de sintaxe óbvios (imports inexistentes, tokens
         inválidos) lendo os arquivos scss/style.scss e scss/variables.scss
      6. Verificar se `style.css` existe com o header WordPress correto
         (Theme Name, Version, etc.)
      7. Reportar estado do ambiente: PRONTO ou BLOQUEADO com lista de problemas
    inputs:
      - package.json
      - webpack.config.js
      - scss/style.scss
      - style.css
    outputs:
      - environment-check.md

  - step: 2
    name: checkpoint-environment
    type: checkpoint
    description: >
      Verificar resultado da validação de ambiente.
      Se o ambiente estiver PRONTO, prosseguir para o build.
      Se houver problemas bloqueantes, corrigir antes de continuar.
    questions:
      - question: O ambiente está validado e pronto para o build de produção?
        options:
          - Sim, executar o build agora
          - Há problemas a corrigir antes

  # ── FASE 2: Build Webpack ─────────────────────────────────────────────────

  - step: 3
    name: webpack-build
    agent: carlos
    description: >
      Executar o build de produção Webpack:
      1. Executar `npm run build` via Bash (webpack --mode=production)
      2. Capturar saída do comando e verificar se terminou com sucesso (exit code 0)
      3. Se falhar, capturar o erro completo e reportar causa provável
      4. Se suceder, listar arquivos gerados em `assets/dist/`:
         - assets/dist/js/main.js (JS transpilado e minificado)
         - assets/dist/css/style.min.css (CSS compilado e minificado)
      5. Registrar tamanho de cada arquivo gerado (em KB)
      6. Verificar se console.log foi removido (drop_console: true em produção)
    inputs:
      - environment-check.md
    outputs:
      - build-report.md

  - step: 4
    name: build-validation
    agent: carlos
    description: >
      Validar a qualidade dos artefatos gerados pelo build:
      1. Confirmar que `assets/dist/js/main.js` existe e tem tamanho > 0
      2. Confirmar que `assets/dist/css/style.min.css` existe e tem tamanho > 0
      3. Verificar se o CSS gerado contém as variáveis críticas do tema
         (buscar por `--wp--preset--color` ou tokens do design system)
      4. Verificar tamanho total dos assets — alertar se JS > 200KB ou CSS > 100KB
         (pode indicar import desnecessário)
      5. Confirmar que source maps NÃO foram gerados (devtool: false em produção)
      6. Reportar: APROVADO ou REPROVADO com detalhes
    inputs:
      - build-report.md
    outputs:
      - build-validation.md

  - step: 5
    name: checkpoint-build
    type: checkpoint
    description: >
      Revisar o resultado do build antes de empacotar.
      Apresentar build-report.md e build-validation.md ao usuário.
    questions:
      - question: O build está aprovado para empacotamento?
        options:
          - Aprovado — prosseguir para empacotamento
          - Reprovado — investigar problema antes de continuar

  # ── FASE 3: Versão ────────────────────────────────────────────────────────

  - step: 6
    name: version-bump
    agent: vera
    description: >
      Gerenciar a versão semântica do tema:
      1. Ler versão atual do `style.css` (linha "Version: X.Y.Z")
      2. Ler versão atual do `package.json`
      3. Ler últimas entradas do CHANGELOG.md (se existir) para contexto
      4. Propor bump de versão com base nos tipos de mudança:
         - PATCH (x.y.Z): correções de bugs, ajustes visuais menores
         - MINOR (x.Y.z): novas funcionalidades sem quebrar compatibilidade
         - MAJOR (X.y.z): mudanças que quebram compatibilidade ou redesign
      5. Perguntar ao usuário qual bump aplicar (checkpoint a seguir)
    inputs:
      - style.css
      - package.json
    outputs:
      - version-proposal.md

  - step: 7
    name: checkpoint-version
    type: checkpoint
    description: >
      Apresentar a versão atual e a proposta de bump ao usuário.
      O usuário escolhe o tipo de incremento.
    questions:
      - question: Qual bump de versão aplicar para este build?
        options:
          - PATCH — correções e ajustes menores
          - MINOR — nova funcionalidade sem quebrar compatibilidade
          - MAJOR — mudança grande ou redesign

  - step: 8
    name: version-apply
    agent: vera
    description: >
      Aplicar o bump de versão escolhido pelo usuário:
      1. Calcular nova versão com base no bump escolhido no checkpoint anterior
      2. Atualizar a linha "Version: X.Y.Z" no `style.css`
      3. Atualizar o campo "version" no `package.json`
      4. Registrar a mudança de versão no output para uso nas release notes
    inputs:
      - version-proposal.md
      - style.css
      - package.json
    outputs:
      - version-applied.md

  # ── FASE 4: Empacotamento ─────────────────────────────────────────────────

  - step: 9
    name: package-zip
    agent: fabio
    description: >
      Gerar o pacote ZIP de produção limpo para deploy:

      INCLUIR no ZIP (apenas arquivos necessários para o tema WordPress):
        - Todos os arquivos .php na raiz
        - style.css (header WordPress)
        - style.min.css (se existir na raiz)
        - screenshot.png (se existir)
        - readme.txt (se existir)
        - theme.json
        - assets/dist/ (todo o conteúdo — JS e CSS compilados)
        - css/ (arquivos CSS não compilados pelo Webpack, ex: hero-header-fix.css, components/)
        - inc/ (código PHP de includes)
        - template-parts/
        - images/ (se existir)
        - fonts/ (se existir)
        - languages/ (se existir)

      EXCLUIR do ZIP:
        - node_modules/
        - .git/ e arquivos .gitignore
        - scss/ (fonte SCSS, já compilado)
        - js/ (fonte JS, já transpilado)
        - squads/
        - _opensquad/
        - .agent/, .claude/, .opencode/, .playwright-mcp/
        - .mcp.json, CLAUDE.md, AGENTS.md, README.md
        - package.json, package-lock.json
        - webpack.config.js
        - composer.json, composer.lock
        - tests/
        - documentacoes/
        - dashboard/
        - skills/
        - *.png (screenshots na raiz)
        - *.map (source maps)

      AÇÃO:
      1. Usar Bash para criar o ZIP:
         cd /media/edson/2661367b-c6e1-4bd6-948a-b4fbb0dfa90b2/edson2/1 - Projetos/01 - UENF/007 - TemaUENF
         zip -r "uenf-geral-claude-vVERSAO.zip" uenf-geral-claude/ [exclusões com -x]
      2. Verificar tamanho do ZIP gerado
      3. Listar conteúdo do ZIP para confirmar que não há arquivos indevidos
      4. Salvar o ZIP no diretório squads/uenf-build/output/TIMESTAMP/
    inputs:
      - version-applied.md
      - build-validation.md
    outputs:
      - package-report.md

  - step: 10
    name: checkpoint-package
    type: checkpoint
    description: >
      Apresentar relatório do empacotamento ao usuário.
      Confirmar que o ZIP está correto antes de gerar release notes.
    questions:
      - question: O pacote ZIP de produção está aprovado?
        options:
          - Aprovado — gerar release notes
          - Verificar conteúdo do ZIP antes de confirmar

  # ── FASE 5: Release Notes ─────────────────────────────────────────────────

  - step: 11
    name: release-notes
    agent: vera
    description: >
      Gerar documentação de release para este build:
      1. Ler git log dos commits desde a última tag de versão
         (usar: git log --oneline --no-decorate $(git describe --tags --abbrev=0 HEAD^)..HEAD
          ou fallback: git log --oneline -20)
      2. Ler build-report.md, build-validation.md, package-report.md
      3. Gerar CHANGELOG-entry.md no formato Keep a Changelog:
         ## [X.Y.Z] - AAAA-MM-DD
         ### Added / Changed / Fixed / Security
      4. Gerar release-summary.md com:
         - Versão liberada
         - Tamanho do pacote ZIP
         - Lista de assets compilados (com tamanhos)
         - Commits incluídos nesta release
         - Instrução de deploy (como instalar o ZIP no WordPress)
    inputs:
      - version-applied.md
      - build-report.md
      - package-report.md
    outputs:
      - CHANGELOG-entry.md
      - release-summary.md

output_dir: squads/uenf-build/output
memory_file: squads/uenf-build/_memory/memories.md
